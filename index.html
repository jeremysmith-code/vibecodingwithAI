<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --bg: #ffffff;
        --text: #222;
        --card: #f5f5f5;
      }

      body.dark {
        --bg: #121212;
        --text: #f5f5f5;
        --card: #1e1e1e;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }

      button {
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        transform: translateY(12px);
        opacity: 0;
        transition:
          transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.45s ease-out,
          box-shadow 0.45s ease;
        will-change: transform, opacity;
      }

      .card.show {
        transform: translateY(0);
        opacity: 1;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
      }

      .card img {
        width: 100%;
        display: block;
        transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card:hover img {
        transform: scale(1.04);
      }

      @media (prefers-reduced-motion: reduce) {
        .card,
        .card img {
          transition: none;
        }

        .card {
          transform: none;
          opacity: 1;
        }

        .card:hover {
          transform: none;
        }
      }

      .card-content {
        padding: 15px;
      }

      .card h3 {
        margin: 0 0 10px;
      }

      .card p {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .price {
        font-weight: bold;
        color: #4caf50;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Product Gallery</h2>
      <button id="themeToggle">Toggle Theme</button>
    </header>

    <section class="gallery">
      <div class="card">
        <img src="https://picsum.photos/300/200?1" alt="Product" />
        <div class="card-content">
          <h3>Product One</h3>
          <p>High-quality item with modern design.</p>
          <span class="price">$49</span>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/200?2" alt="Product" />
        <div class="card-content">
          <h3>Product Two</h3>
          <p>Perfect for everyday use and comfort.</p>
          <span class="price">$79</span>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/200?3" alt="Product" />
        <div class="card-content">
          <h3>Product Three</h3>
          <p>Elegant and stylish for all occasions.</p>
          <span class="price">$99</span>
        </div>
      </div>
    </section>

    <script>
      // Theme Toggle
      const toggleBtn = document.getElementById("themeToggle");
      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
      });

      // Fade-in Animation
      const cards = document.querySelectorAll(".card");

      window.addEventListener("load", () => {
        cards.forEach((card, index) => {
          setTimeout(() => {
            card.classList.add("show");
          }, index * 200);
        });
      });
    </script>
  </body>
</html>
